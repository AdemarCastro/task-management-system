name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: task_manager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d task_manager"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SECRET_KEY: ci-secret-for-tests-32-characters-long
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/task_manager
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements/dev.txt
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements/dev.txt
      - name: Audit backend dependencies
        working-directory: backend
        run: python -m pip_audit -r requirements/base.txt
      - name: Ruff
        working-directory: backend
        run: |
          ruff check .
          ruff format --check .
      - name: Migrate
        working-directory: backend
        run: python manage.py migrate --noinput
      - name: Pytest
        working-directory: backend
        run: pytest --cov=apps --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm run test
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: docker build ./frontend
      - name: Prepare compose environment
        run: cp .env.example .env
      - name: Start E2E stack
        run: docker compose up -d --build database backend frontend selenium
      - name: Wait for frontend
        run: curl --fail --retry 20 --retry-delay 2 http://localhost:5173
      - name: Run Selenium journeys
        run: docker compose run --rm e2e
      - name: Stop E2E stack
        if: always()
        run: docker compose down -v --remove-orphans
