services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      database:
        condition: service_healthy
    command: ["./entrypoint.sh"]

  frontend:
    build:
      context: ./frontend
      target: development
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  selenium:
    image: selenium/standalone-chrome:124.0
    shm_size: 2gb
    ports:
      - "4444:4444"
    profiles:
      - e2e

  e2e:
    build:
      context: ./frontend
      target: development
    env_file:
      - .env
    environment:
      E2E_APP_URL: http://frontend:5173
      SELENIUM_REMOTE_URL: http://selenium:4444/wd/hub
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - frontend
      - selenium
    command: ["npm", "run", "test:e2e"]
    profiles:
      - e2e

volumes:
  postgres_data:
  frontend_node_modules:
